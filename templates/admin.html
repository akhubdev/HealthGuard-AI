

<!DOCTYPE html>

<html>

<head>

<title>HealthGuard AI Admin Panel</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

.admin-container{
text-align:center;
padding-top:40px;
color:white;
}

.stats-box{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
}

.stat-card{
width:220px;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.stat-card h2{
font-size:32px;
margin-top:10px;
}

.chart-box{
width:600px;
margin:auto;
margin-top:60px;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

</style>

</head>

<body>

<div class="admin-container">

<h1>HealthGuard AI - Admin Analytics</h1>

<div class="stats-box">

<div class="stat-card">
<h3>Total Patients</h3>
<h2>{{ total }}</h2>
</div>

<div class="stat-card">
<h3>Low Risk</h3>
<h2>{{ low }}</h2>
</div>

<div class="stat-card">
<h3>Medium Risk</h3>
<h2>{{ medium }}</h2>
</div>

<div class="stat-card">
<h3>High Risk</h3>
<h2>{{ high }}</h2>
</div>

</div>

<div class="chart-box">

<h2>Risk Distribution Chart</h2>

<canvas id="riskChart"></canvas>

</div>

<br><br>

<a href="/dashboard">Back to Dashboard</a>

</div>

<script>

let low = Number("{{ low }}");
let medium = Number("{{ medium }}");
let high = Number("{{ high }}");

const ctx = document.getElementById('riskChart');

new Chart(ctx, {

type: 'bar',

data: {

labels: ['Low Risk','Medium Risk','High Risk'],

datasets: [{

label: 'Patient Risk Distribution',

data: [low, medium, high],

backgroundColor: [

'#2ecc71',
'#f1c40f',
'#e74c3c'

],

borderWidth: 1

}]

},

options: {

responsive: true,

plugins: {

legend: {

labels: {

color: 'white'

}

}

},

scales: {

y: {

beginAtZero: true,

ticks: {

color: 'white'

}

},

x: {

ticks: {

color: 'white'

}

}

}

}

});

</script>

</body>
</html>
