

<!DOCTYPE html>
<html>

<head>

<title>HealthGuard AI - Prediction</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

.predict-wrapper{
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
margin-top:40px;
}

.predict-card{

width:420px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:30px;
border-radius:16px;
box-shadow:0 0 25px rgba(0,255,255,0.2);

}

.predict-card h2{
text-align:center;
margin-bottom:20px;
}

.form-group{
display:flex;
flex-direction:column;
margin-bottom:15px;
}

.form-group label{
margin-bottom:5px;
font-size:14px;
}

.form-group input{
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

.predict-btn{

margin-top:10px;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;

}

.predict-btn:hover{

background:#2563eb;

}

.back-btn{

margin-bottom:20px;
padding:10px 15px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;

}

</style>

</head>

<body>

<div class="predict-wrapper">

<a href="/dashboard">
<button class="back-btn">
<i class="fa-solid fa-arrow-left"></i> Back to Dashboard
</button>
</a>

<div class="predict-card">

<h2><i class="fa-solid fa-stethoscope"></i> Diabetes Risk Prediction</h2>

<form method="POST">

<div class="form-group">
<label>Patient Name</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>Age</label>
<input type="number" name="age" required>
</div>

<div class="form-group">
<label>BMI</label>
<input type="number" step="0.1" name="bmi" required>
</div>

<div class="form-group">
<label>High Blood Pressure (0 = No, 1 = Yes)</label>
<input type="number" name="highbp" min="0" max="1" required>
</div>

<div class="form-group">
<label>High Cholesterol (0 = No, 1 = Yes)</label>
<input type="number" name="highchol" min="0" max="1" required>
</div>

<div class="form-group">
<label>Smoker (0 = No, 1 = Yes)</label>
<input type="number" name="smoker" min="0" max="1" required>
</div>

<button class="predict-btn">
<i class="fa-solid fa-brain"></i> Predict Risk
</button>

</form>

</div>

</div>

</body>

</html>
